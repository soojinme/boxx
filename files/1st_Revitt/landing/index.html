<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revitt — 지금 이 순간</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Inter:wght@300;400;700;900&display=swap');


  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --violet: #7B4FFF;
    --violet-dark: #3D1F8A;
    --orange: #FF6B2B;
    --lime: #B8FF4F;
    --bg: #0A0A0F;
    --surface: #13131C;
    --text: #F0EEF8;
    --muted: rgba(240,238,248,0.45);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── GLOW BLOBS ── */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.35;
    pointer-events: none;
  }
  .blob-1 {
    width: 600px; height: 600px;
    background: var(--violet);
    top: -200px; left: -100px;
  }
  .blob-2 {
    width: 400px; height: 400px;
    background: var(--orange);
    top: 200px; right: -120px;
    opacity: 0.2;
  }
  .blob-3 {
    width: 300px; height: 300px;
    background: var(--lime);
    bottom: 100px; left: 40%;
    opacity: 0.12;
  }

  /* ── NAV ── */
  nav {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px;
  }
  .logo {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--violet); }
  .nav-badge {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 6px 14px;
    border-radius: 100px;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 24px;
    padding-top: 60px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--violet);
    background: rgba(123,79,255,0.12);
    border: 1px solid rgba(123,79,255,0.3);
    padding: 8px 18px;
    border-radius: 100px;
    margin-bottom: 40px;
  }
  .eyebrow::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--violet);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(42px, 8vw, 88px);
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.03em;
    max-width: 900px;
    margin-bottom: 12px;
  }
  h1 .line-muted {
    color: var(--muted);
    display: block;
    font-size: 0.65em;
    font-weight: 300;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  h1 .line-main {
    display: block;
    background: linear-gradient(135deg, #fff 0%, var(--violet) 60%, var(--orange) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    font-size: 18px;
    font-weight: 300;
    color: var(--muted);
    max-width: 480px;
    line-height: 1.7;
    margin-top: 28px;
    margin-bottom: 56px;
  }
  .sub strong { color: var(--text); font-weight: 700; }

  /* ── WAITLIST FORM ── */
  .waitlist {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 6px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .waitlist:focus-within {
    border-color: var(--violet);
  }
  .waitlist input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    padding: 12px 16px;
    font-family: inherit;
  }
  .waitlist input::placeholder { color: var(--muted); }
  .waitlist button {
    background: var(--violet);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 22px;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: background 0.2s;
  }
  .waitlist button:hover { background: #9370ff; }

  .waitlist-note {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 80px;
  }
  .waitlist-note a { color: var(--violet); text-decoration: none; }

  /* ── LIVE FEED PREVIEW ── */
  .feed-preview {
    position: relative;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
  }
  .feed-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .feed-card-img {
    height: 200px;
    background: linear-gradient(135deg, #2A1A4E, #1A1A3E);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
  }
  .live-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--orange);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .live-badge::before {
    content: '';
    width: 5px; height: 5px;
    background: #fff;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  .feed-card-body {
    padding: 16px;
  }
  .feed-card-user {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--violet), var(--orange));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .user-info { flex: 1; }
  .user-name { font-size: 13px; font-weight: 700; }
  .user-time { font-size: 11px; color: var(--muted); }
  .feed-text {
    font-size: 13px;
    color: rgba(240,238,248,0.8);
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .feed-reactions {
    display: flex;
    gap: 8px;
  }
  .reaction-pill {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    cursor: pointer;
  }
  .reaction-pill.active {
    background: rgba(123,79,255,0.15);
    border-color: var(--violet);
    color: var(--text);
  }

  /* ── FEATURES ROW ── */
  .features {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 0 24px 80px;
    flex-wrap: wrap;
  }
  .feature-chip {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 12px 22px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feature-chip em {
    font-style: normal;
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<nav>
  <div class="logo">Rev<span>itt</span></div>
  <div class="nav-badge">Coming Soon</div>
</nav>

<section class="hero">
  <div class="eyebrow">지금 이 순간 · Real-time Review SNS</div>

  <h1>
    <span class="line-muted">세상은</span>
    <span class="line-main">나 혼자가<br>아니었다.</span>
  </h1>

  <p class="sub">
    배가 고플 때, <strong>지금 누군가는 뭘 먹고 있을까.</strong><br>
    그 순간의 감정을 나누는 리뷰 SNS.
  </p>

  <div class="waitlist">
    <input type="email" placeholder="이메일 주소를 입력해주세요">
    <button>대기 등록 →</button>
  </div>
  <p class="waitlist-note">친구 초대하면 대기 순서 빨라져요 · <a href="#">개인정보처리방침</a></p>

  <div class="feed-preview">
    <div class="feed-card">
      <div class="feed-card-img">
        🍜
        <span class="live-badge">Live</span>
      </div>
      <div class="feed-card-body">
        <div class="feed-card-user">
          <div class="avatar">🐰</div>
          <div class="user-info">
            <div class="user-name">취향탐험가</div>
            <div class="user-time">방금 · 마포구</div>
          </div>
        </div>
        <p class="feed-text">비가 오는 날 혼자 먹는 라멘은 왜 이렇게 완벽하지 🌧️</p>
        <div class="feed-reactions">
          <span class="reaction-pill active">🙋 나도!</span>
          <span class="reaction-pill">✅ 다녀왔어요</span>
          <span class="reaction-pill">📌 가고싶다</span>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="features">
  <div class="feature-chip"><em>🕐</em> 시간따라 변하는 앱</div>
  <div class="feature-chip"><em>⭐</em> 별점 말고 감정으로</div>
  <div class="feature-chip"><em>📍</em> 지금 내 주변 리뷰</div>
  <div class="feature-chip"><em>🐰</em> 나만의 리뷰 캐릭터</div>
</div>

</body>
</html>
