<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>Revitt — My Page</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@400;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--orange:#FF6B2B;--bg:#0A0A0F;--surface:#13131C;--surface2:#1C1C28;--border:rgba(255,255,255,0.08);--text:#F0EEF8;--muted:rgba(240,238,248,0.45);}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;width:375px;min-height:812px;}

  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 0;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;}

  /* PROFILE HEADER */
  .profile-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start;}
  .profile-title{font-size:18px;font-weight:900;}
  .settings-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;}

  .profile-info{padding:20px 20px 0;display:flex;gap:16px;align-items:center;}
  .profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#FF6B2B,#FF9F6B);display:flex;align-items:center;justify-content:center;font-size:36px;border:3px solid var(--orange);flex-shrink:0;}
  .profile-meta{flex:1;}
  .profile-name{font-size:18px;font-weight:900;margin-bottom:4px;}
  .profile-bio{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
  .edit-btn{display:inline-block;padding:7px 16px;border-radius:100px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text);}

  .stats-row{display:flex;gap:0;padding:20px 20px 0;}
  .stat{flex:1;text-align:center;padding:14px 0;background:var(--surface);border:1px solid var(--border);}
  .stat:first-child{border-radius:12px 0 0 12px;}
  .stat:last-child{border-radius:0 12px 12px 0;}
  .stat-num{font-size:20px;font-weight:900;}
  .stat-label{font-size:11px;color:var(--muted);margin-top:2px;}

  /* TITLE/BADGE */
  .title-section{padding:20px 20px 0;}
  .section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;}
  .title-card{background:linear-gradient(135deg,rgba(255,107,43,0.12),rgba(123,79,255,0.08));border:1px solid rgba(255,107,43,0.25);border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;}
  .title-emoji{font-size:32px;}
  .title-info{flex:1;}
  .title-name{font-size:15px;font-weight:700;color:var(--orange);}
  .title-rarity{font-size:12px;color:var(--muted);margin-top:3px;}
  .title-change{font-size:12px;color:var(--muted);}

  /* REVIEW GRID */
  .review-section{padding:20px 20px 0;}
  .review-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border);}
  .review-tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:500;color:var(--muted);}
  .review-tab.active{color:var(--text);font-weight:700;border-bottom:2px solid var(--orange);margin-bottom:-1px;}
  .review-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;}
  .review-thumb{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;}
  .review-thumb:first-child{border-radius:8px 0 0 0;}
  .review-thumb:nth-child(3){border-radius:0 8px 0 0;}
  .review-badge{position:absolute;bottom:6px;left:6px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;background:rgba(10,10,15,0.75);}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;width:375px;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;padding:10px 0 24px;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);font-weight:500;}
  .nav-item.active{color:var(--orange);}
  .nav-icon{font-size:20px;line-height:1;}
  .nav-cta{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text);font-weight:700;}
  .nav-cta-btn{width:48px;height:48px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin-top:-20px;box-shadow:0 0 20px rgba(255,107,43,0.5);}
</style>
</head>
<body>

<div class="status-bar">
  <span>9:41</span>
  <div style="display:flex;gap:5px;"><span>●●●●</span><span>🔋</span></div>
</div>

<div class="profile-header">
  <div class="profile-title">마이페이지</div>
  <div class="settings-btn">⚙️</div>
</div>

<div class="profile-info">
  <div class="profile-avatar">🐰</div>
  <div class="profile-meta">
    <div class="profile-name">취향탐험가</div>
    <div class="profile-bio">음식과 영화를 사랑하는 사람 🍜🎬</div>
    <div class="edit-btn">프로필 수정</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-num">47</div><div class="stat-label">리뷰</div></div>
  <div class="stat" style="border-left:none;border-right:none;"><div class="stat-num">128</div><div class="stat-label">팔로워</div></div>
  <div class="stat"><div class="stat-num">89</div><div class="stat-label">팔로잉</div></div>
</div>

<div class="title-section">
  <div class="section-label">현재 칭호</div>
  <div class="title-card">
    <div class="title-emoji">🍜</div>
    <div class="title-info">
      <div class="title-name">맛집 탐험가</div>
      <div class="title-rarity">상위 8% · 음식 리뷰 30개 달성</div>
    </div>
    <div class="title-change">변경 ›</div>
  </div>
</div>

<div class="review-section">
  <div class="review-tabs">
    <div class="review-tab active">전체</div>
    <div class="review-tab">음식</div>
    <div class="review-tab">영화</div>
    <div class="review-tab">도서</div>
  </div>
  <div class="review-grid">
    <div class="review-thumb" style="background:linear-gradient(135deg,#1A1008,#2E1800);">🍜<span class="review-badge">🔥</span></div>
    <div class="review-thumb" style="background:linear-gradient(135deg,#0A0A1A,#1A0A2E);">🎬<span class="review-badge">📢</span></div>
    <div class="review-thumb" style="background:linear-gradient(135deg,#081A10,#0A2818);">📚<span class="review-badge">🤫</span></div>
    <div class="review-thumb" style="background:linear-gradient(135deg,#1A0A1A,#2E0A2E);">🍣</div>
    <div class="review-thumb" style="background:linear-gradient(135deg,#0A1A1A,#0A2E2E);">🎭</div>
    <div class="review-thumb" style="background:linear-gradient(135deg,#1A1A0A,#2E2E0A);">☕</div>
  </div>
</div>

<div style="height:100px;"></div>

<div class="bottom-nav">
  <div class="nav-item"><span class="nav-icon">🏠</span><span>홈</span></div>
  <div class="nav-item"><span class="nav-icon">🔭</span><span>둘러보기</span></div>
  <div class="nav-cta"><div class="nav-cta-btn">+</div><span>리뷰</span></div>
  <div class="nav-item"><span class="nav-icon">🔍</span><span>검색</span></div>
  <div class="nav-item active"><span class="nav-icon">👤</span><span>마이</span></div>
</div>

</body>
</html>
