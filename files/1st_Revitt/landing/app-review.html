<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>Revitt — Write Review</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@400;500;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #FF6B2B;
    --orange-light: rgba(255,107,43,0.12);
    --bg: #0A0A0F;
    --surface: #13131C;
    --surface2: #1C1C28;
    --border: rgba(255,255,255,0.08);
    --text: #F0EEF8;
    --muted: rgba(240,238,248,0.45);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    width: 375px;
    min-height: 812px;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px 0;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px 0;
  }
  .header-cancel { font-size: 15px; color: var(--muted); }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-post {
    font-size: 15px; font-weight: 700;
    color: var(--orange);
    background: var(--orange-light);
    padding: 7px 16px;
    border-radius: 100px;
  }

  /* IMAGE UPLOAD */
  .img-upload {
    margin: 20px 20px 0;
    height: 220px;
    background: var(--surface);
    border: 1.5px dashed rgba(255,107,43,0.3);
    border-radius: 20px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
  }
  .img-upload-icon { font-size: 36px; }
  .img-upload-text { font-size: 13px; color: var(--muted); }
  .img-upload-sub { font-size: 11px; color: rgba(240,238,248,0.25); }

  /* CATEGORY SELECT */
  .section { padding: 20px 20px 0; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .cat-row { display: flex; gap: 8px; }
  .cat-chip {
    padding: 9px 18px; border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 13px; font-weight: 500; color: var(--muted);
  }
  .cat-chip.active {
    background: var(--orange-light);
    border-color: var(--orange);
    color: var(--orange);
    font-weight: 700;
  }

  /* PLACE TAG */
  .place-input {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 13px 16px;
    border: 1px solid var(--border);
  }
  .place-icon { font-size: 18px; flex-shrink: 0; }
  .place-text { font-size: 14px; font-weight: 500; }
  .place-arrow { margin-left: auto; color: var(--muted); font-size: 16px; }

  /* TEXT AREA */
  .text-area {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    min-height: 80px;
  }
  .text-area-placeholder { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .text-counter { text-align: right; font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* SHARE LEVEL — 핵심 UI */
  .share-label {
    font-size: 14px; font-weight: 700; margin-bottom: 14px;
  }
  .share-options { display: flex; flex-direction: column; gap: 8px; }
  .share-option {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface2);
  }
  .share-option.selected {
    border-color: var(--orange);
    background: var(--orange-light);
  }
  .share-option-emoji { font-size: 22px; width: 28px; text-align: center; }
  .share-option-text { flex: 1; }
  .share-option-title { font-size: 14px; font-weight: 600; }
  .share-option-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .share-option-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .share-option.selected .share-option-check {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }

  /* POST BTN */
  .post-btn {
    margin: 24px 20px;
    background: var(--orange);
    color: #fff;
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(255,107,43,0.35);
  }
</style>
</head>
<body>

<div class="status-bar">
  <span>9:41</span>
  <div style="display:flex;gap:5px;">
    <span>●●●●</span><span>🔋</span>
  </div>
</div>

<div class="header">
  <div class="header-cancel">취소</div>
  <div class="header-title">리뷰 남기기</div>
  <div class="header-post">올리기</div>
</div>

<!-- IMAGE -->
<div class="img-upload">
  <div class="img-upload-icon">📷</div>
  <div class="img-upload-text">사진 또는 영상 추가</div>
  <div class="img-upload-sub">최대 5장 · 영상 60초 이하</div>
</div>

<!-- CATEGORY -->
<div class="section">
  <div class="section-label">카테고리</div>
  <div class="cat-row">
    <div class="cat-chip active">🍜 음식</div>
    <div class="cat-chip">🎬 영화</div>
    <div class="cat-chip">📚 도서</div>
  </div>
</div>

<!-- PLACE -->
<div class="section">
  <div class="section-label">장소 태그</div>
  <div class="place-input">
    <div class="place-icon">📍</div>
    <div class="place-text" style="color: var(--text);">합정동 라멘집</div>
    <div class="place-arrow">›</div>
  </div>
</div>

<!-- TEXT -->
<div class="section">
  <div class="section-label">한 줄 감상 <span style="color:var(--muted);font-weight:400;">(선택)</span></div>
  <div class="text-area">
    <div class="text-area-placeholder">지금 이 순간의 감정을 남겨봐요</div>
  </div>
  <div class="text-counter">0 / 300</div>
</div>

<!-- SHARE LEVEL -->
<div class="section">
  <div class="share-label">이 경험, 얼마나 알리고 싶어?</div>
  <div class="share-options">
    <div class="share-option">
      <div class="share-option-emoji">🤫</div>
      <div class="share-option-text">
        <div class="share-option-title">나만 알고 싶어</div>
        <div class="share-option-sub">숨겨진 보석 같은 곳이야</div>
      </div>
      <div class="share-option-check"></div>
    </div>
    <div class="share-option">
      <div class="share-option-emoji">🙋</div>
      <div class="share-option-text">
        <div class="share-option-title">친한 친구한테만</div>
        <div class="share-option-sub">알 사람만 알면 돼</div>
      </div>
      <div class="share-option-check"></div>
    </div>
    <div class="share-option selected">
      <div class="share-option-emoji">📢</div>
      <div class="share-option-text">
        <div class="share-option-title">다 알았으면 좋겠어</div>
        <div class="share-option-sub">진짜 좋아서 추천하고 싶어</div>
      </div>
      <div class="share-option-check">✓</div>
    </div>
    <div class="share-option">
      <div class="share-option-emoji">🔥</div>
      <div class="share-option-text">
        <div class="share-option-title">온 세상이 알아야 해</div>
        <div class="share-option-sub">이건 진짜 레전드야</div>
      </div>
      <div class="share-option-check"></div>
    </div>
  </div>
</div>

<div class="post-btn">🐰 리뷰 올리기</div>

</body>
</html>
