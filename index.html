<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      margin: 0;
      background: #fafafa;
      color: #111;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }

    .item:last-child {
      border-bottom: none;
    }

    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    /* 📱 반응형 */
    @media (max-width: 500px) {
      .item {
        flex-direction: column;
        gap: 6px;
      }

      a {
        align-self: flex-start;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Files</h1>

    <div class="card" id="fileList">
      Loading...
    </div>
  </div>

  <script>
    const username = "soojinme";
    const repo = "boxx";

    fetch(`https://api.github.com/repos/${username}/${repo}/contents/files`)
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("fileList");
        list.innerHTML = "";

        data.forEach(file => {
          const div = document.createElement("div");
          div.className = "item";

          div.innerHTML = `
            <div class="name">${file.name}</div>
            <a href="${file.download_url}">Download</a>
          `;

          list.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById("fileList").innerText = "Failed to load";
      });
  </script>

</body>
</html>
