<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="topbar">
    <div class="top-left">
      <input type="checkbox" id="selectAll" onchange="toggleAll(this)">
      <label for="selectAll">전체 선택</label>
    </div>

    <div class="top-right">
      <span id="selectedCount">0개 선택</span>
      <button class="btn" onclick="downloadSelected()" disabled>Download</button>
    </div>
  </div>

  <div class="card" id="fileList">Loading...</div>

</div>

<script src="script.js"></script>
</body>
</html>
