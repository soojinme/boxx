<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Files</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      background: #ffffff;
      color: #111;
      margin: 0;
      padding: 40px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .list {
      max-width: 700px;
      border-top: 1px solid #e5e7eb;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
    }

    .name {
      color: #111;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>Files</h1>
  <div class="list" id="fileList">Loading...</div>

  <script>
    const username = "soojinme";
    const repo = "boxx";

    fetch(`https://api.github.com/repos/${username}/${repo}/contents/files`)
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("fileList");
        list.innerHTML = "";

        data.forEach(file => {
          const div = document.createElement("div");
          div.className = "item";

          div.innerHTML = `
            <div class="name">${file.name}</div>
            <a href="${file.download_url}">Download</a>
          `;

          list.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById("fileList").innerText = "Failed to load";
      });
  </script>

</body>
</html>
