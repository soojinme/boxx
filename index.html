<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      margin: 0;
      background: #fafafa;
      color: #111;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }

    .left {
      display: flex;
      flex-direction: column;
    }

    .name {
      font-weight: 500;
    }

    .time {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .btn {
      background: #111;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #333;
    }

    @media (max-width: 500px) {
      .item {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Files</h1>
    <div class="card" id="fileList">Loading...</div>
  </div>

  <script>
    const username = "soojinme";
    const repo = "boxx";

    async function loadFiles() {
      const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/files`);
      const files = await res.json();

      const list = document.getElementById("fileList");
      list.innerHTML = "";

      for (const file of files) {
        // commit 정보 가져오기
        const commitRes = await fetch(
          `https://api.github.com/repos/${username}/${repo}/commits?path=files/${file.name}&per_page=1`
        );
        const commitData = await commitRes.json();

        const date = new Date(commitData[0].commit.committer.date);
        const formatted = date.toLocaleString();

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <div class="left">
            <div class="name">${file.name}</div>
            <div class="time">${formatted}</div>
          </div>
          <a class="btn" href="${file.download_url}">Download</a>
        `;

        list.appendChild(div);
      }
    }

    loadFiles().catch(() => {
      document.getElementById("fileList").innerText = "Failed to load";
    });
  </script>

</body>
</html>
