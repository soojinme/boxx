<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My File Server</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 40px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      max-width: 600px;
    }

    .file {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    .download {
      background: #38bdf8;
      color: black;
      padding: 5px 10px;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <h1>📂 파일 목록</h1>

  <div class="box" id="fileList"></div>

  <script>
    const files = [
      "file1.zip",
      "file2.pdf",
      "image.png"
    ];

    const list = document.getElementById("fileList");

    files.forEach(file => {
      const div = document.createElement("div");
      div.className = "file";

      div.innerHTML = `
        <div>${file}</div>
        <a class="download" href="files/${file}" download>다운로드</a>
      `;

      list.appendChild(div);
    });
  </script>

</body>
</html>
